# Fail2Ban filter for Authentik login failures via Traefik access logs
# Matches HTTP 401/403 responses from the auth domain

[Definition]

# Match failed authentication attempts (401 Unauthorized, 403 Forbidden)
# Traefik JSON log format: "ClientHost":"IP","DownstreamStatus":401,...
failregex = ^\{.*"ClientHost":"<HOST>".*"DownstreamStatus":40[13].*\}$

ignoreregex =

datepattern = %%Y-%%m-%%dT%%H:%%M:%%S
